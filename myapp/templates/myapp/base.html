<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

    <title>Bus Reservation System</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark"
        style="background: linear-gradient(to right, #00416A, #1CB5E0); animation: fadeDown 1s;">
        <div class="container">

            <a class="navbar-brand font-weight-bold" href="{% url 'home' %}">
                🚌 Vallacar Transit
            </a>

            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav ml-auto">

                    <a class="nav-item nav-link nav-anim" href="{% url 'home' %}">Home</a>
                    <a class="nav-item nav-link nav-anim" href="{% url 'findbus' %}">Find Bus</a>
                    <a class="nav-item nav-link nav-anim" href="{% url 'seebookings' %}">My Bookings</a>

                    {% if request.user.is_active %}
                    <a class="nav-item nav-link btn btn-warning text-dark ml-2" href="{% url 'signout' %}">
                        Sign Out
                    </a>
                    {% else %}
                    <a class="nav-item nav-link btn btn-light text-dark ml-2" href="{% url 'signup' %}">
                        Sign Up
                    </a>
                    {% endif %}

                </div>
            </div>
        </div>
    </nav>

    <style>
        .nav-anim {
            position: relative;
            margin-right: 15px;
            font-size: 17px;
        }

        .nav-anim::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            background: white;
            left: 0;
            bottom: 0;
            transition: 0.3s;
        }

        .nav-anim:hover::after {
            width: 100%;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

    {% block content %}
    {% endblock %}
    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"
        integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"
        integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy"
        crossorigin="anonymous"></script>
</body>

</html>
